spring.application.name=ftpclient

# Root directory all file operations are restricted to.
# Override on the command line with: --app.root-dir=C:/your/folder
app.root-dir=${user.dir}

# Where user settings (theme, saved FTP connections, last-opened directories)
# are persisted. Defaults to ~/.browseftp/settings.json.
# Override with: --app.settings-file=/path/to/settings.json
app.settings-file=${user.home}/.browseftp/settings.json

# Allow larger uploads (reserved for future upload support)
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

